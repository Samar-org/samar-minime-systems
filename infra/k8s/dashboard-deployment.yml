apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: samar-minime
  labels:
    app: dashboard
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/_next/metrics"
    spec:
      serviceAccountName: dashboard
      imagePullSecrets:
        - name: samar-minime-docker-secret
      containers:
        - name: dashboard
          image: ghcr.io/samar-minime/samar-minime-systems/dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: samar-minime-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXTAUTH_URL
              value: "https://dashboard.samar.io"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: samar-minime-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: samar-minime-secrets
                  key: DATABASE_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: samar-minime-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: samar-minime-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: samar-minime-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: samar-minime-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: MIXPANEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: samar-minime-secrets
                  key: MIXPANEL_TOKEN
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: samar-minime-config
                  key: LOG_LEVEL
          livenessProbe:
            httpGet:
              path: /_next/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_next/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /_next/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - dashboard
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: samar-minime
  labels:
    app: dashboard
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: dashboard

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard
  namespace: samar-minime

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dashboard-pdb
  namespace: samar-minime
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dashboard
