# ============================================================================
# Samar-Minime Llama Worker Fleet — Docker Compose
# Production-grade vLLM inference with API gateway, worker queue, monitoring
# ============================================================================

version: "3.9"

x-gpu-common: &gpu-common
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  # ── vLLM Inference Server (Primary — Llama 3.1 8B) ────────────────────────
  vllm-8b:
    image: vllm/vllm-openai:v0.6.6
    container_name: samar-vllm-8b
    <<: *gpu-common
    command:
      - --model=meta-llama/Llama-3.1-8B-Instruct
      - --served-model-name=llama-3.1-8b
      - --host=0.0.0.0
      - --port=8000
      - --max-model-len=8192
      - --gpu-memory-utilization=0.90
      - --max-num-batched-tokens=32768
      - --max-num-seqs=256
      - --dtype=auto
      - --enforce-eager
      - --enable-prefix-caching
      - --disable-log-requests
      - --trust-remote-code
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      CUDA_VISIBLE_DEVICES: "0"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    volumes:
      - model-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - llama-net

  # ── vLLM Inference Server (Heavy — Llama 3.1 70B) ─────────────────────────
  vllm-70b:
    image: vllm/vllm-openai:v0.6.6
    container_name: samar-vllm-70b
    <<: *gpu-common
    command:
      - --model=meta-llama/Llama-3.1-70B-Instruct
      - --served-model-name=llama-3.1-70b
      - --host=0.0.0.0
      - --port=8001
      - --max-model-len=8192
      - --gpu-memory-utilization=0.92
      - --tensor-parallel-size=${VLLM_70B_TP_SIZE:-4}
      - --max-num-batched-tokens=16384
      - --max-num-seqs=128
      - --dtype=auto
      - --quantization=${VLLM_70B_QUANTIZATION:-awq}
      - --enforce-eager
      - --enable-prefix-caching
      - --disable-log-requests
      - --trust-remote-code
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    volumes:
      - model-cache:/root/.cache/huggingface
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped
    networks:
      - llama-net
    profiles:
      - heavy  # Only start with: docker compose --profile heavy up

  # ── Llama Fleet API Gateway ────────────────────────────────────────────────
  llama-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: samar-llama-api
    environment:
      VLLM_8B_URL: http://vllm-8b:8000
      VLLM_70B_URL: http://vllm-70b:8001
      REDIS_URL: redis://redis:6379/1
      API_KEYS: ${LLAMA_API_KEYS}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-600}
      RATE_LIMIT_TPM: ${RATE_LIMIT_TPM:-1000000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_BATCHING: "true"
      MAX_BATCH_SIZE: "32"
      BATCH_TIMEOUT_MS: "50"
    ports:
      - "8080:8080"
    depends_on:
      vllm-8b:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - llama-net

  # ── Task Worker (Queue Consumer) ───────────────────────────────────────────
  llama-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: samar-llama-worker
    environment:
      LLAMA_API_URL: http://llama-api:8080
      REDIS_URL: redis://redis:6379/1
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-16}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-8}
      POLL_INTERVAL_MS: "100"
      MAX_RETRIES: "3"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      llama-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llama-net

  # ── Redis (Queue + Cache + Rate Limiting) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: samar-llama-redis
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - llama-net

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: samar-llama-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      llama-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - llama-net
    profiles:
      - production

  # ── Prometheus (Metrics) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: samar-llama-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    restart: unless-stopped
    networks:
      - llama-net

  # ── Grafana (Dashboards) ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: samar-llama-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - llama-net

volumes:
  model-cache:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  llama-net:
    driver: bridge
