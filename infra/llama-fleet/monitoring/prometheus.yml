global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'llama-fleet-api'
    scrape_interval: 10s
    static_configs:
      - targets: ['llama-api:8080']

  - job_name: 'vllm-8b'
    static_configs:
      - targets: ['vllm-8b:8000']

  - job_name: 'vllm-70b'
    static_configs:
      - targets: ['vllm-70b:8001']

  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'gpu-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['gpu-exporter:9400']
