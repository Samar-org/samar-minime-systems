# ============================================================================
# Samar-Minime Llama Fleet — Nginx Reverse Proxy
# TLS termination, rate limiting, request buffering, upstream health checks
# ============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Logging ──────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types application/json text/plain text/event-stream;

    # ── Rate Limiting Zones ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=100r/s;
    limit_req_zone $http_authorization zone=api_per_key:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ── Upstream: Llama Fleet API ────────────────────────────────────
    upstream llama_api {
        least_conn;
        server llama-api:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS ──────────────────────────────────────────────────────
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ─────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Rate Limiting ────────────────────────────────────────────
        limit_req zone=api_per_ip burst=50 nodelay;
        limit_req zone=api_per_key burst=20 nodelay;
        limit_conn conn_per_ip 100;

        # ── Chat Completions (high timeout for inference) ────────────
        location /v1/chat/completions {
            proxy_pass http://llama_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── Task Queue Endpoints ─────────────────────────────────────
        location /v1/tasks/ {
            proxy_pass http://llama_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 30s;
        }

        # ── Models List ──────────────────────────────────────────────
        location /v1/models {
            proxy_pass http://llama_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_cache_valid 200 60s;
        }

        # ── Health Check ─────────────────────────────────────────────
        location /health {
            proxy_pass http://llama_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Metrics (restrict access) ────────────────────────────────
        location /metrics {
            proxy_pass http://llama_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Restrict to internal networks
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
        }

        # ── Deny everything else ─────────────────────────────────────
        location / {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}
