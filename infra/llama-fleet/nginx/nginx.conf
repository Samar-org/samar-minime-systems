user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # JSON logging
  log_format json_combined escape=json
    '{"
    '  "time_local": "$time_local",
    '  "remote_addr": "$remote_addr",
    '  "request_method": "$request_method",
    '  "request_uri": "$request_uri",
    '  "status": $status,
    '  "bytes_sent": $bytes_sent,
    '  "request_time": $request_time,
    '  "upstream_response_time": "$upstream_response_time",
    '  "user_agent": "$http_user_agent",
    '  "http_x_forwarded_for": "$http_x_forwarded_for"
    '}';

  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
  limit_req_zone $http_authorization zone=key_limit:10m rate=50r/s;

  # Upstream vLLM services
  upstream vllm_backend {
    least_conn;
    server vllm-8b:8000 max_fails=3 fail_timeout=10s;
    server vllm-70b:8001 max_fails=3 fail_timeout=10s backup;

    keepalive 32;
  }

  # API Gateway
  server {
    listen 8080 ssl http2;
    server_name llama-fleet.local;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health endpoint (no rate limit)
    location /health {
      access_log off;
      return 200 '{"status": "ok"}';
      add_header Content-Type application/json;
    }

    # Chat completions — long timeout for inference
    location /v1/chat/completions {
      limit_req zone=api_limit burst=10;
      limit_req zone=key_limit burst=5;
      limit_req_status 429;

      proxy_pass http://vllm_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_connect_timeout 10s;
      proxy_send_timeout 120s;
      proxy_read_timeout 120s;
    }

    # Async task endpoints
    location /v1/tasks/ {
      limit_req zone=api_limit burst=20;
      limit_req zone=key_limit burst=10;

      proxy_pass http://llama-api:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # Models list — cache for 5 minutes
    location /v1/models {
      limit_req zone=api_limit burst=5;

      proxy_pass http://llama-api:8080;
      proxy_cache_valid 200 5m;
      proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
      add_header X-Cache-Status $upstream_cache_status;
      proxy_set_header Host $host;
    }

    # Metrics — restrict to internal IPs
    location /metrics {
      allow 127.0.0.1;
      allow 172.16.0.0/12;  # Docker internal network
      allow 192.168.0.0/16;  # Private network
      deny all;

      proxy_pass http://llama-api:8080;
      proxy_set_header Host $host;
      access_log off;
    }

    # Root endpoint
    location / {
      return 404 '{"error": "not found"}';
      add_header Content-Type application/json;
    }
  }
}
